{% set name = "radicli" %}
{% set version = "0.0.26" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/radicli-{{ version }}.tar.gz
  sha256: 81c8c186b4c5785f7504e13d7d524ccb86de604adf06131ca64b817f41c76a99

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    - radicli
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/explosion/radicli
  summary: Radically lightweight command-line interfaces
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
